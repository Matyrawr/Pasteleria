spring.datasource.url=jdbc:h2:mem:pasteleria
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.jpa.show-sql=true

# Swagger Fix
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# JWT Secret (can be plain text or base64). For production, use a long base64 key.
# JWT secret must be >= 256 bits for HMAC-SHA (use base64). For tests we use a 32-byte base64 key.
jwt.secret=MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=
# Token expiration in milliseconds (used by JwtService)
jwt.expirationMs=86400000

# Refresh token expiration in milliseconds (7 days)
app.refreshTokenExpirationMs=604800000
